name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun x ultracite check

      - name: Test boundaries
        run: bun test --cwd packages/boundaries

      - name: Test cli
        run: bun test --cwd packages/cli

      - name: Test eslint-plugin
        run: bun run --cwd packages/eslint-plugin test

      - name: Test biome-plugin
        run: bun test --cwd packages/biome-plugin

      - name: Build packages
        run: bun run dma:build

      - name: Test oxlint-plugin
        run: bun run --cwd packages/oxlint-plugin test
